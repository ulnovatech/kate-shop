name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  check:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run verify:admin-routes
      - run: npm run build:all
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
          VITE_SUPABASE_PROJECT_ID: ci-placeholder
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key

  deploy-production:
    name: Deploy production
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.APP_ORIGIN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build:storefront
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Prepare Wrangler config
        run: node scripts/prepare-deploy.mjs
        env:
          KATE_DIST_DIR: apps/storefront/dist
          CLOUDFLARE_WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME }}
          NODE_ENV: production
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          ADMIN_ORIGIN: ${{ steps.deploy_urls.outputs.admin_origin }}
          VITE_ADMIN_ORIGIN: ${{ steps.deploy_urls.outputs.admin_origin }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          BOOTSTRAP_TOKEN: ${{ secrets.BOOTSTRAP_TOKEN }}
          CLOUDFLARE_ZONE_NAME: ${{ vars.CLOUDFLARE_ZONE_NAME }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/storefront/dist/server
          command: deploy --config wrangler.json
          secrets: |
            SUPABASE_SERVICE_ROLE_KEY
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  deploy-admin-production:
    name: Deploy admin production
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.ADMIN_ORIGIN != '' && vars.ADMIN_ORIGIN || 'https://kate-admin.ulnovatech.workers.dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy URLs
        id: deploy_urls
        run: |
          ADMIN="${{ vars.ADMIN_ORIGIN }}"
          APP="${{ vars.APP_ORIGIN }}"
          if [ -z "$ADMIN" ]; then ADMIN="https://kate-admin.ulnovatech.workers.dev"; fi
          if [ -z "$APP" ]; then APP="https://kate-shop.ulnovatech.workers.dev"; fi
          echo "admin_origin=$ADMIN" >> "$GITHUB_OUTPUT"
          echo "app_origin=$APP" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build:admin
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          ADMIN_ORIGIN: ${{ steps.deploy_urls.outputs.admin_origin }}
          VITE_ADMIN_ORIGIN: ${{ steps.deploy_urls.outputs.admin_origin }}
          APP_ORIGIN: ${{ steps.deploy_urls.outputs.app_origin }}
          VITE_APP_ORIGIN: ${{ steps.deploy_urls.outputs.app_origin }}

      - name: Prepare admin Wrangler config
        run: node scripts/prepare-deploy.mjs
        env:
          KATE_DIST_DIR: apps/admin/dist
          KATE_WORKER_TARGET: admin
          CLOUDFLARE_ADMIN_WORKER_NAME: ${{ vars.CLOUDFLARE_ADMIN_WORKER_NAME }}
          NODE_ENV: production
          APP_ORIGIN: ${{ steps.deploy_urls.outputs.app_origin }}
          ADMIN_ORIGIN: ${{ steps.deploy_urls.outputs.admin_origin }}
          VITE_ADMIN_ORIGIN: ${{ steps.deploy_urls.outputs.admin_origin }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          BOOTSTRAP_TOKEN: ${{ secrets.BOOTSTRAP_TOKEN }}
          CLOUDFLARE_ZONE_NAME: ${{ vars.CLOUDFLARE_ZONE_NAME }}
          GITHUB_REPO: ulnovatech/kate-shop

      - name: Deploy admin Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/admin/dist/server
          command: deploy --config wrangler.json
          secrets: |
            SUPABASE_SERVICE_ROLE_KEY
            KATE_GH_RELEASE_TOKEN
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KATE_GH_RELEASE_TOKEN: ${{ secrets.KATE_GH_RELEASE_TOKEN }}

  deploy-preview:
    name: Deploy PR preview
    needs: check
    if: github.event_name == 'pull_request' && vars.CLOUDFLARE_DEPLOY_PREVIEWS == 'true'
    runs-on: ubuntu-latest
    environment:
      name: preview
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build:storefront
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Prepare Wrangler config
        run: node scripts/prepare-deploy.mjs
        env:
          KATE_DIST_DIR: apps/storefront/dist
          CLOUDFLARE_WORKER_NAME: kate-shop-pr-${{ github.event.pull_request.number }}
          NODE_ENV: production
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Deploy preview Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/storefront/dist/server
          command: deploy --config wrangler.json
          secrets: |
            SUPABASE_SERVICE_ROLE_KEY
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  e2e:
    name: E2E (optional)
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.E2E_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PIN: ${{ secrets.E2E_ADMIN_PIN }}
          E2E_BASE_URL: http://localhost:8080
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
