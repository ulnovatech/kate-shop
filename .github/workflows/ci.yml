name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  check:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run verify:admin-routes
      - run: npm run build:all
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
          VITE_SUPABASE_PROJECT_ID: ci-placeholder
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key

  deploy-production:
    name: Deploy production
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.APP_ORIGIN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build:storefront
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Prepare Wrangler config
        run: node scripts/prepare-deploy.mjs
        env:
          KATE_DIST_DIR: apps/storefront/dist
          CLOUDFLARE_WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME }}
          NODE_ENV: production
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
          VITE_ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          BOOTSTRAP_TOKEN: ${{ secrets.BOOTSTRAP_TOKEN }}
          CLOUDFLARE_ZONE_NAME: ${{ vars.CLOUDFLARE_ZONE_NAME }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/storefront/dist/server
          command: deploy
          secrets: |
            SUPABASE_SERVICE_ROLE_KEY
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  deploy-admin-production:
    name: Deploy admin production
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ADMIN_ORIGIN != ''
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.ADMIN_ORIGIN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build:admin
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
          VITE_ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          VITE_APP_ORIGIN: ${{ vars.APP_ORIGIN }}

      - name: Prepare admin Wrangler config
        run: node scripts/prepare-deploy.mjs
        env:
          KATE_DIST_DIR: apps/admin/dist
          KATE_WORKER_TARGET: admin
          CLOUDFLARE_ADMIN_WORKER_NAME: ${{ vars.CLOUDFLARE_ADMIN_WORKER_NAME }}
          NODE_ENV: production
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
          VITE_ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          BOOTSTRAP_TOKEN: ${{ secrets.BOOTSTRAP_TOKEN }}
          CLOUDFLARE_ZONE_NAME: ${{ vars.CLOUDFLARE_ZONE_NAME }}

      - name: Deploy admin Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/admin/dist/server
          command: deploy
          secrets: |
            SUPABASE_SERVICE_ROLE_KEY
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  build-admin-apk:
    name: Build Kate Admin APK
    needs: [check, deploy-admin-production]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ADMIN_ORIGIN != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Build debug APK
        run: npm run build:admin-apk
        env:
          ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
          VITE_ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
          KATE_ANDROID_VERSION_BUILD: ${{ github.run_number }}
          KATE_RELEASE_VERSION: ${{ vars.KATE_RELEASE_VERSION }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kate-admin-apk-${{ github.run_number }}
          path: dist/admin-mobile/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Build signed release APK
        if: vars.BUILD_ADMIN_APK_RELEASE == 'true'
        run: npm run build:admin-apk:release
        env:
          ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
          VITE_ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
          KATE_ANDROID_VERSION_BUILD: ${{ github.run_number }}
          KATE_RELEASE_VERSION: ${{ vars.KATE_RELEASE_VERSION }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload release APK artifact
        if: vars.BUILD_ADMIN_APK_RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kate-admin-apk-release-${{ github.run_number }}
          path: dist/admin-mobile/*-release.apk
          retention-days: 90
          if-no-files-found: error

      - name: Build signed release AAB
        if: vars.BUILD_ADMIN_AAB == 'true'
        run: npm run build:admin-aab:release
        env:
          ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
          VITE_ADMIN_ORIGIN: ${{ vars.ADMIN_ORIGIN }}
          KATE_ANDROID_VERSION_BUILD: ${{ github.run_number }}
          KATE_RELEASE_VERSION: ${{ vars.KATE_RELEASE_VERSION }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload release AAB artifact
        if: vars.BUILD_ADMIN_AAB == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kate-admin-aab-release-${{ github.run_number }}
          path: dist/admin-mobile/*-release.aab
          retention-days: 90
          if-no-files-found: error

  deploy-preview:
    name: Deploy PR preview
    needs: check
    if: github.event_name == 'pull_request' && vars.CLOUDFLARE_DEPLOY_PREVIEWS == 'true'
    runs-on: ubuntu-latest
    environment:
      name: preview
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build:storefront
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Prepare Wrangler config
        run: node scripts/prepare-deploy.mjs
        env:
          KATE_DIST_DIR: apps/storefront/dist
          CLOUDFLARE_WORKER_NAME: kate-shop-pr-${{ github.event.pull_request.number }}
          NODE_ENV: production
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Deploy preview Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/storefront/dist/server
          command: deploy
          secrets: |
            SUPABASE_SERVICE_ROLE_KEY
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  e2e:
    name: E2E (optional)
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.E2E_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PIN: ${{ secrets.E2E_ADMIN_PIN }}
          E2E_BASE_URL: http://localhost:8080
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
